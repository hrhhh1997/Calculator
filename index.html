<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
        <script src="./js/js-file.js" defer></script>
        <link rel="stylesheet" href="./css/styles.css">
    </head>

    <body>
        <div class="main-container">

            <div class="calc-container">
                <div class="screen">0123456789</div>
    
                <div class="buttons">
                    
                        <div class="buttons-row-1">
                            <button id="btn-power">O/I</button>
                            <button id="btn-clearAll" class="special-btns">CE</button>
                            <button id="btn-clear">C</button>
                            <button id="btn-divide">/</button>
                        </div>
                            
                        <div class="buttons-row-2">  
                            <button id="btn-7">7</button>
                            <button id="btn-8">8</button>
                            <button id="btn-9">9</button>
                            <button id="btn-multiply">X</button>
                        </div>
    
                        <div class="buttons-row-3">
                            <button id="btn-4">4</button>
                            <button id="btn-5">5</button>
                            <button id="btn-6">6</button>
                            <button id="btn-subtract">-</button>
                        </div>
    
                        <div class="buttons-row-4">
                            <button id="btn-4">1</button>
                            <button id="btn-5">2</button>
                            <button id="btn-3">3</button>
                            <button id="btn-add">+</button>
                        </div>
    
                        <div class="buttons-row-5">
                            <button id="btn-0">0</button>
                            <button id="btn-decimal">.</button>
                            <button id="btn-equals" class="special-btns">=</button>
                        </div>
                            
                </div>
                <p>N.K.N.A.</p>
            </div>

        </div>
    </body>

</html>
